  flavorText: >-
    Two pillars of icy blue light shine from the screen of a rather lithe yet flexible IRC, towering at 7ft on a pair of springleaf legs.


    Marred plating flanks their body with an oddly squishy amount of give, synthetic fibers woven into worn, slash, spatter and repair riddled segments that mimic an awfully curvacious humanoid form.

    Despite the spindly nature of some plating arrays it all seems to thrum with strength, covering intricate works below.. spare parts sure, but ones proven strong in the test of time.


    Sizeable assets lay backed below any outerwear, yet even if they're devoid of outerwear they seem to be modestly concealed despite the curvacious nature of custom built plating, and soft squishy padding flanking their rear and chest, with an odd looking screened faceplate leading semi-smoothly into soft synthlips.
